document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rk) 100%);\n    color: var(--ink);\n    overflow:hidden;\n  }\n  /* paper grain via noise */\n  .poster::before{\n    content:\"\"; position:absolute; inset:0; pointer-events:none;\n    background-image:\n      url(\"data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPSc0MDAnIGhlaWdodD0nNDAwJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC44NScgbnVtT2N0YXZlcz0nMicgc3RpdGNoVGlsZXM9J3N0aXRjaCcvPjxmZUNvbG9yTWF0cml4IHZhbHVlcz0nMCAwIDAgMCAwLjM1ICAwIDAgMCAwIDAuMjUgIDAgMCAwIDAgMC4xMiAgMCAwIDAgMC4yMiAwJy8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9JzEwMCUnIGhlaWdodD0nMTAwJScgZmlsdGVyPSd1cmwoI24pJy8+PC9zdmc+\");\n    opacity:.55; mix-blend-mode:multiply;\n  }\n  /* foxing/age marks at corners */\n  .poster::after{\n    content:\"\"; position:absolute; inset:0; pointer-events:none;\n    background:\n      radial-gradient(circle at 4% 3%, rgba(120,80,30,.32), transparent 8%),\n      radial-gradient(circle at 97% 5%, rgba(120,80,30,.28), transparent 9%),\n      radial-gradient(circle at 3% 97%, rgba(120,80,30,.30), transparent 10%),\n      radial-gradient(circle at 96% 96%, rgba(120,80,30,.28), transparent 8%),\n      radial-gradient(ellipse at 50% 100%, rgba(80,50,20,.25), transparent 25%);\n    mix-blend-mode:multiply;\n  }\n\n  .frame{\n    position:absolute;\n    left:236px; right:236px;\n    top:140px; bottom:140px;\n    /* 2cm sides margin enforced; same vertical for harmony */\n  }\n\n  /* --- Masthead --- */\n  .masthead{\n    position:relative;\n    padding-bottom: 24px;\n    margin-bottom: 30px;\n  }\n  .mem-band{\n    display:flex; align-items:center; gap:24px;\n    font-family:'Special Elite', monospace;\n    font-size: 28px; letter-spacing:.55em;\n    color: var(--ink-soft);\n    text-transform:uppercase;\n  }\n  .mem-band .line{ flex:1; height:2px; background: var(--ink-soft); opacity:.6; }\n  .mem-band .star{ font-size:34px; color: var(--red); }\n\n  .title-row{\n    display:grid;\n    grid-template-columns: 1.3fr 1fr;\n    gap: 40px;\n    align-items: end;\n    margin-top: 36px;\n  }\n  h1.bigtitle{\n    font-family:'Permanent Marker', cursive;\n    font-size: 220px;\n    line-height: .85;\n    letter-spacing: -2px;\n    color: var(--ink);\n    text-shadow: 4px 4px 0 rgba(138,42,31,.22);\n    transform: rotate(-1.4deg);\n  }\n  h1.bigtitle .small{ display:block; font-size:78px; letter-spacing:6px; font-family:'Caveat',cursive; font-weight:700; transform: rotate(.6deg); margin-bottom:-6px;}\n  .name-card{\n    border: 3px solid var(--ink);\n    padding: 28px 30px 24px;\n    background: rgba(255,250,230,.5);\n    transform: rotate(1.2deg);\n    position:relative;\n  }\n  .name-card h2{\n    font-family:'Caveat',cursive; font-weight:700;\n    font-size: 78px; line-height: 1; color:var(--ink);\n  }\n  .name-card .amp{ color: var(--red); }\n  .name-card .lives{\n    font-family:'Special Elite', monospace;\n    font-size: 26px; line-height:1.45;\n    margin-top: 18px; color: var(--ink-soft);\n  }\n  .name-card .lives b{ color:var(--ink); }\n  .name-card .stamp{\n    position:absolute; right:-30px; top:-30px;\n    width:160px; height:160px; border-radius:50%;\n    border: 4px double var(--red);\n    color:var(--red);\n    display:flex; align-items:center; justify-content:center; text-align:center;\n    font-family:'Special Elite', monospace; font-size:18px; line-height:1.15;\n    transform: rotate(-12deg);\n    background: rgba(255,245,220,.7);\n    opacity:.85;\n  }\n\n  /* --- Prelude / opening narrative --- */\n  .prelude{\n    margin-top: 50px;\n    display:grid;\n    grid-template-columns: 220px 1fr;\n    gap: 30px;\n    align-items:start;\n    border-top: 2px dashed var(--ink-soft);\n    border-bottom: 2px dashed var(--ink-soft);\n    padding: 28px 0 32px;\n  }\n  .prelude .date-tab{\n    font-family:'Permanent Marker', cursive;\n    color: var(--red);\n    font-size: 60px; line-height:.95;\n    transform: rotate(-3deg);\n    padding-top: 6px;\n  }\n  .prelude .date-tab small{\n    display:block; font-family:'Patrick Hand', sans-serif;\n    font-size:26px; color: var(--ink-soft); letter-spacing:2px;\n    transform: rotate(2deg); margin-top:4px;\n  }\n  .prelude p{\n    font-family:'Patrick Hand', sans-serif;\n    font-size: 30px; line-height:1.42;\n    color: var(--ink);\n  }\n  .prelude p .hi{ color:var(--red); font-weight:700; }\n  .prelude p i{ font-family:'Caveat',cursive; font-weight:600; font-size:34px; }\n\n  /* --- Storyboard grid --- */\n  .storyboard{\n    margin-top: 50px;\n    display:grid;\n    grid-template-columns: repeat(3, 1fr);\n    grid-template-rows: repeat(2, 760px);\n    gap: 32px;\n  }\n  .panel{\n    position:relative;\n    padding: 26px 30px 24px;\n    background: rgba(255,250,230,.35);\n    display:flex; flex-direction:column;\n    /* paper card subtle tilt */\n  }\n  .panel:nth-child(1){ transform: rotate(-.6deg); }\n  .panel:nth-child(2){ transform: rotate(.5deg); }\n  .panel:nth-child(3){ transform: rotate(-.4deg); }\n  .panel:nth-child(4){ transform: rotate(.6deg); }\n  .panel:nth-child(5){ transform: rotate(-.5deg); }\n  .panel:nth-child(6){ transform: rotate(.4deg); }\n\n  .panel .border-svg{\n    position:absolute; inset:0; pointer-events:none;\n    width:100%; height:100%;\n  }\n  .panel .nr{\n    position:absolute; left:-14px; top:-22px;\n    width:60px; height:60px; border-radius:50%;\n    background: var(--ink); color: var(--paper);\n    display:flex; align-items:center; justify-content:center;\n    font-family:'Permanent Marker', cursive; font-size:30px;\n    transform: rotate(-8deg);\n    z-index:3;\n  }\n  .panel .yr{\n    align-self:flex-start;\n    font-family:'Special Elite', monospace;\n    font-size: 22px; letter-spacing: 4px;\n    color: var(--red);\n    border-bottom: 2px solid var(--red);\n    padding-bottom: 2px; margin-bottom: 6px;\n  }\n  .panel h3{\n    font-family:'Permanent Marker', cursive;\n    font-size: 46px; line-height: 1;\n    color: var(--ink);\n    margin: 4px 0 14px;\n  }\n  .panel .icon-wrap{\n    flex: 0 0 230px;\n    min-height: 0;\n    display:flex; align-items:center; justify-content:center;\n    margin: 2px 0 10px;\n    position:relative;\n    overflow: hidden;\n  }\n  .panel .icon-svg{\n    width: 100%;\n    height: 100%;\n    max-height: 230px;\n    display:block;\n    overflow:visible;\n  }\n  .panel .cap{\n    font-family:'Patrick Hand', sans-serif;\n    font-size: 23px; line-height: 1.32;\n    color: var(--ink);\n  }\n  .panel .cap .em{ color: var(--red); font-weight:bold; }\n  .panel .doc-strip{\n    font-family:'Special Elite', monospace;\n    font-size: 18px; line-height:1.3;\n    color: var(--ink-soft);\n    margin-top: auto;\n    padding-top: 10px;\n    border-top: 1.5px dashed var(--ink-soft);\n  }\n  .panel .doc-strip b{ color: var(--ink); }\n\n  /* connectors arrows between panels (sketchy) */\n  .arrow-overlay{\n    position:absolute; inset:0; pointer-events:none;\n    z-index: 2;\n  }\n\n  /* --- Coda --- */\n  .coda{\n    margin-top: 46px;\n    position:relative;\n    padding: 36px 50px;\n    display:grid;\n    grid-template-columns: 1fr 280px;\n    gap: 36px;\n    align-items:center;\n  }\n  .coda-bg-svg{\n    position:absolute; inset:0; width:100%; height:100%;\n    pointer-events:none;\n  }\n  .coda p{\n    font-family:'Cormorant Garamond', serif;\n    font-style: italic;\n    font-size: 32px;\n    line-height: 1.45;\n    color: var(--ink);\n  }\n  .coda p .hebrew{\n    font-family:'Cormorant Garamond', serif;\n    font-style: normal;\n    color: var(--red);\n    font-size: 36px;\n    letter-spacing:2px;\n  }\n  .coda .yahrzeit{\n    text-align:center;\n    font-family:'Caveat',cursive; font-weight:700;\n    color: var(--red);\n    font-size: 34px;\n    line-height:1.1;\n  }\n  .coda .yahrzeit .star-big{ font-size:80px; color: var(--gold); display:block; line-height:1; margin-bottom: 8px;}\n  .coda .yahrzeit small{ display:block; font-family:'Special Elite', monospace; font-size:18px; color:var(--ink-soft); letter-spacing:2px; margin-top:6px;}\n\n  /* --- Sources footer --- */\n  .sources{\n    margin-top: 28px;\n    border-top: 3px solid var(--ink);\n    padding-top: 18px;\n    display:grid;\n    grid-template-columns: 220px 1fr;\n    gap: 26px;\n  }\n  .sources h4{\n    font-family:'Permanent Marker', cursive;\n    color: var(--red);\n    font-size: 38px;\n    line-height:1;\n    transform: rotate(-2deg);\n  }\n  .sources h4 small{\n    display:block; font-family:'Special Elite', monospace;\n    font-size: 15px; letter-spacing:3px; color:var(--ink-soft);\n    margin-top: 8px; transform: rotate(2deg);\n  }\n  .sources ol{\n    list-style: none; padding:0; margin:0;\n    columns: 2; column-gap: 38px;\n    font-family:'Special Elite', monospace;\n    font-size: 15.5px; line-height: 1.5;\n    color: var(--ink-soft);\n  }\n  .sources ol li{\n    break-inside: avoid;\n    padding: 4px 0 6px 0;\n    border-bottom: 1px dotted rgba(60,50,30,.4);\n  }\n  .sources ol li:first-child, .sources ol li:nth-child(2){\n    color: var(--ink);\n    font-weight:bold;\n  }\n  .sources ol li .ref{\n    color: var(--red); font-weight:bold;\n  }\n  .sources .colophon{\n    font-family:'Caveat', cursive;\n    font-size: 22px;\n    color: var(--ink-soft);\n    margin-top: 12px;\n    column-span: all;\n    text-align:right;\n    border-top: 1px solid var(--ink-soft);\n    padding-top: 8px;\n  }\n\n  /* Caption (handwritten) accents */\n  .scribble{\n    position:absolute;\n    font-family:'Caveat',cursive; font-weight:600;\n    font-size:24px;\n    color: var(--red);\n    transform: rotate(-6deg);\n  }\n\n  /* Decoration: tape pieces */\n  .tape{\n    position:absolute;\n    width:120px; height:34px;\n    background: rgba(220,200,140,.6);\n    border-left: 1px dashed rgba(120,90,40,.4);\n    border-right: 1px dashed rgba(120,90,40,.4);\n    box-shadow: inset 0 0 10px rgba(180,150,80,.3);\n    z-index: 4;\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"poster\" id=\"poster\">\n  <div class=\"frame\">\n\n    <!-- ============ MASTHEAD ============ -->\n    <header class=\"masthead\">\n      <div class=\"mem-band\">\n        <span class=\"line\"><\u002Fspan>\n        <span class=\"star\">✡<\u002Fspan>\n        <span>Zum Gedenken — Stolpersteine der Erinnerung<\u002Fspan>\n        <span class=\"star\">✡<\u002Fspan>\n        <span class=\"line\"><\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"title-row\">\n        <h1 class=\"bigtitle\">\n          <span class=\"small\">Familie<\u002Fspan>\n          BAUM\n        <\u002Fh1>\n        <div class=\"name-card\">\n          <div class=\"stamp\">Nürnberg<br>1900<br>—<br>1943<\u002Fdiv>\n          <h2>Abraham <span class=\"amp\">&amp;<\u002Fspan> Ida<\u002Fh2>\n          <div class=\"lives\">\n            <b>Abraham Baum<\u002Fb><br>\n            * 29. September 1862, Gymnich<br>\n            † 24. Januar 1943, Theresienstadt<br><br>\n            <b>Ida Baum, geb. Berger<\u002Fb><br>\n            * 20. April 1872, Šaštín (Ungarn)<br>\n            † 15. Februar 1932, Nürnberg\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- ============ PRELUDE ============ -->\n    <section class=\"prelude\">\n      <div class=\"date-tab\">\n        Nürnberg<br>1900\n        <small>Ein neues Leben<\u002Fsmall>\n      <\u002Fdiv>\n      <p>\n        Am <span class=\"hi\">26. Februar 1900<\u002Fspan> ziehen Abraham und Ida Baum gemeinsam nach Nürnberg. Er ist Händler, später <i>Vereinsdiener<\u002Fi> beim Religionsverein <i>Adas Israel<\u002Fi>; sie ist seine zweite Frau, eine kleine, dunkelblonde Ungarin mit einem verkrüppelten rechten Daumen. Die Ehe bleibt kinderlos. Über drei Jahrzehnte lang teilen sie ein bescheidenes Leben im 2. Stock am Feuerweg 7 — bis Ida 1932 stirbt und Abraham allein zurückbleibt, in einer Welt, die ihn bald nicht mehr dulden wird.\n      <\u002Fp>\n    <\u002Fsection>\n\n    <!-- ============ STORYBOARD ============ -->\n    <section class=\"storyboard\" id=\"storyboard\">\n\n      <article class=\"panel\" data-icon=\"candle\">\n        <div class=\"nr\">1<\u002Fdiv>\n        <div class=\"yr\">15. FEBRUAR 1932<\u002Fdiv>\n        <h3>Der erste Verlust<\u002Fh3>\n        <div class=\"icon-wrap\"><svg class=\"icon-svg\" viewBox=\"0 0 300 280\"><\u002Fsvg><\u002Fdiv>\n        <p class=\"cap\">Ida Baum stirbt mit 59 Jahren in Nürnberg. Sie wird Zeugin des Schlimmsten nicht mehr werden müssen. Abraham, fast 70, ist nun <span class=\"em\">Witwer<\u002Fspan> in der gemeinsamen Wohnung am Feuerweg 7.<\u002Fp>\n        <div class=\"doc-strip\"><b>Meldekarte:<\u002Fb> verstorben 15. II. 1932 · Pensionist<\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"panel\" data-icon=\"house\">\n        <div class=\"nr\">2<\u002Fdiv>\n        <div class=\"yr\">10. DEZEMBER 1938<\u002Fdiv>\n        <h3>Vertrieben<\u002Fh3>\n        <div class=\"icon-wrap\"><svg class=\"icon-svg\" viewBox=\"0 0 300 280\"><\u002Fsvg><\u002Fdiv>\n        <p class=\"cap\">Der 76-jährige Witwer wird gezwungen, als Untermieter in das <span class=\"em\">»Judenhaus«<\u002Fspan> Rosenaustraße 13 zu ziehen — drei Treppen hoch, ein Zimmer bei der Familie Strauß. Eines von 52 solchen Häusern in Nürnberg.<\u002Fp>\n        <div class=\"doc-strip\"><b>Adresse:<\u002Fb> Rosenaustraße 13, III. Stock, b/Strauß<\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"panel\" data-icon=\"gold\">\n        <div class=\"nr\">3<\u002Fdiv>\n        <div class=\"yr\">22. MÄRZ 1939<\u002Fdiv>\n        <h3>Beraubt<\u002Fh3>\n        <div class=\"icon-wrap\"><svg class=\"icon-svg\" viewBox=\"0 0 300 280\"><\u002Fsvg><\u002Fdiv>\n        <p class=\"cap\">Beim <span class=\"em\">»Leihamt der Stadt der Reichsparteitage«<\u002Fspan> muss er sein Gold abliefern — <i>Abgabenummer 671<\u002Fi>. Er unterschreibt mit dem Zwangsnamen <b>»Abraham Israel Baum«<\u002Fb>.<\u002Fp>\n        <div class=\"doc-strip\"><b>Abgaben:<\u002Fb> 1 Herrenuhr · 1 Damenuhr · 2 Ketten · 1 Brosche · 2 Ringe — alles Gold<\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"panel\" data-icon=\"train\">\n        <div class=\"nr\">4<\u002Fdiv>\n        <div class=\"yr\">11. SEPTEMBER 1942<\u002Fdiv>\n        <h3>Deportiert<\u002Fh3>\n        <div class=\"icon-wrap\"><svg class=\"icon-svg\" viewBox=\"0 0 300 280\"><\u002Fsvg><\u002Fdiv>\n        <p class=\"cap\">Mit Transport <span class=\"em\">II/25, Nr. 22<\u002Fspan> wird Abraham nach Theresienstadt verbracht. Abfahrtsort: die <i>Fäkalien-Verladestation<\u002Fi> am städtischen Schlachthof in der Finkenstraße 33 — eine letzte Demütigung.<\u002Fp>\n        <div class=\"doc-strip\"><b>Strecke:<\u002Fb> Nürnberg → Theresienstadt · 80 Jahre alt<\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"panel\" data-icon=\"star\">\n        <div class=\"nr\">5<\u002Fdiv>\n        <div class=\"yr\">24. JANUAR 1943, 15 Uhr<\u002Fdiv>\n        <h3>Allein gestorben<\u002Fh3>\n        <div class=\"icon-wrap\"><svg class=\"icon-svg\" viewBox=\"0 0 300 280\"><\u002Fsvg><\u002Fdiv>\n        <p class=\"cap\">Nach kaum vier Monaten im überfüllten Ghetto. Todesursache: <i>Marasmus — Altersschwäche<\u002Fi> und <i>Paralysis Cordis — Herzlähmung<\u002Fi>. Gebäude <span class=\"em\">I 508<\u002Fspan>, Zimmer: <span class=\"em\">der Boden<\u002Fspan>.<\u002Fp>\n        <div class=\"doc-strip\"><b>Todesfallanzeige:<\u002Fb> Verwandte — <i>(leere Zeilen)<\u002Fi><\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"panel\" data-icon=\"chair\">\n        <div class=\"nr\">6<\u002Fdiv>\n        <div class=\"yr\">1948 — 1959<\u002Fdiv>\n        <h3>Das Schweigen<\u002Fh3>\n        <div class=\"icon-wrap\"><svg class=\"icon-svg\" viewBox=\"0 0 300 280\"><\u002Fsvg><\u002Fdiv>\n        <p class=\"cap\">Keine Kinder. Keine Erben. Nur die <span class=\"em\">JRSO<\u002Fspan> meldet am 10. Dezember 1948 vergeblich seinen Schmuck zur Rückerstattung an. <i>1959 wird das Verfahren für erledigt erklärt.<\u002Fi> Das Gold kehrt zu niemandem zurück.<\u002Fp>\n        <div class=\"doc-strip\"><b>Az.:<\u002Fb> III JR 7112 · zurückgenommen 23. XI. 1957<\u002Fdiv>\n      <\u002Farticle>\n\n    <\u002Fsection>\n\n    <!-- ============ CODA ============ -->\n    <section class=\"coda\">\n      <svg class=\"coda-bg-svg\" id=\"codaBg\"><\u002Fsvg>\n      <p>\n        Dies ist die Geschichte einer kleinen, kinderlosen Familie, deren Namen niemand mehr genannt hätte — wenn nicht Meldekarten und Passbilder, Abgabenlisten und Todesfallanzeigen geblieben wären. Möge ihr Andenken ein Segen sein. <span class=\"hebrew\">זִכְרוֹנָם לִבְרָכָה<\u002Fspan>\n      <\u002Fp>\n      <div class=\"yahrzeit\">\n        <span class=\"star-big\">✡<\u002Fspan>\n        Abraham &amp; Ida<br>BAUM\n        <small>* Feuerweg 7 · Nürnberg *<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ SOURCES ============ -->\n    <footer class=\"sources\">\n      <h4>Quellen<small>Documents · Archives<\u002Fsmall><\u002Fh4>\n      <div>\n        <ol>\n          <li><span class=\"ref\">(1)<\u002Fspan> Stadtarchiv Nürnberg (StadtAN), <b>C 21/X/1/0376<\u002Fb> — Meldekarte Abraham und Ida Baum.<\u002Fli>\n          <li><span class=\"ref\">(2)<\u002Fspan> Stadtarchiv Nürnberg (StadtAN), <b>C 21/VII Nr. 318<\u002Fb> — Passkarte Abraham Baum, 1932.<\u002Fli>\n          <li><span class=\"ref\">(3)<\u002Fspan> StadtAN, C 21/VII Nr. 358 — Passkarte Ida Baum, 1925.<\u002Fli>\n          <li><span class=\"ref\">(4)<\u002Fspan> MyHeritage — Stammbaum Familie Baum.<\u002Fli>\n          <li><span class=\"ref\">(5)<\u002Fspan> StadtAN, C 61/737 — Ablieferungsliste Leihamt Nürnberg, 22. März 1939, Abgabe-Nr. 671.<\u002Fli>\n          <li><span class=\"ref\">(6)<\u002Fspan> Staatsarchiv Nürnberg (StAN), Wiedergutmachungsbehörde III, Rückerstattungsakte III JR 7112.<\u002Fli>\n          <li><span class=\"ref\">(7)<\u002Fspan> Holocaust.cz, Datenbank der Opfer — Abraham Baum, Transport II/25.<\u002Fli>\n          <li><span class=\"ref\">(8)<\u002Fspan> Gerhard Jochem / StadtAN: Judentopographie Nürnberg, SW 3 Finkenstraße 33.<\u002Fli>\n        <\u002Fol>\n        <div class=\"colophon\">Zusammengestellt zum Gedenken · Nürnberg · ein Stolperstein aus Papier<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Ffooter>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* ============================================================\n   Hand-drawn rendering with Rough.js\n   - panel borders\n   - simple symbolic icons per panel\n   - coda decorative wreath\n   ============================================================ */\n(function(){\n  const INK   = '#1c1a15';\n  const RED   = '#8a2a1f';\n  const GOLD  = '#b8860b';\n  const SOFT  = '#3a342a';\n\n  function init(){\n    // PANEL BORDERS\n    document.querySelectorAll('.panel').forEach(panel => {\n      const w = panel.offsetWidth;\n      const h = panel.offsetHeight;\n      const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');\n      svg.setAttribute('class','border-svg');\n      svg.setAttribute('viewBox',`0 0 ${w} ${h}`);\n      svg.setAttribute('preserveAspectRatio','none');\n      panel.insertBefore(svg, panel.firstChild);\n      const rc = rough.svg(svg);\n\n      // outer rough rect\n      svg.appendChild(rc.rectangle(8, 8, w-16, h-16, {\n        stroke: INK, strokeWidth: 3.5, roughness: 2.4, bowing: 1.6, fill: 'none'\n      }));\n      // inner thin ghost rect\n      svg.appendChild(rc.rectangle(16, 16, w-32, h-32, {\n        stroke: INK, strokeWidth: 1, roughness: 1.6, bowing: 1.2, fill: 'none',\n        seed: Math.floor(Math.random()*1000)\n      }));\n    });\n\n    // ICONS per panel — wrap rc so every call auto-appends to its svg\n    document.querySelectorAll('.panel').forEach(panel => {\n      const kind = panel.dataset.icon;\n      const svg = panel.querySelector('.icon-svg');\n      if(!svg) return;\n      const rawRc = rough.svg(svg);\n      const rc = wrapRc(rawRc, svg);\n      drawIcon(rc, svg, kind);\n    });\n\n    // CODA wreath background\n    const codaBg = document.getElementById('codaBg');\n    if(codaBg){\n      const w = codaBg.parentElement.offsetWidth;\n      const h = codaBg.parentElement.offsetHeight;\n      codaBg.setAttribute('viewBox',`0 0 ${w} ${h}`);\n      codaBg.setAttribute('preserveAspectRatio','none');\n      const rc = rough.svg(codaBg);\n      codaBg.appendChild(rc.rectangle(6, 6, w-12, h-12, {\n        stroke: INK, strokeWidth: 2.5, roughness: 2.2, bowing: 2, fill: 'none'\n      }));\n      codaBg.appendChild(rc.rectangle(14, 14, w-28, h-28, {\n        stroke: RED, strokeWidth: 1, roughness: 1.8, bowing: 1.4, fill: 'none'\n      }));\n    }\n  }\n\n  function wrapRc(rc, svg){\n    const methods = ['rectangle','ellipse','circle','line','polygon','path','curve','arc','linearPath'];\n    const out = {};\n    methods.forEach(m => {\n      if(typeof rc[m] === 'function'){\n        out[m] = (...args) => {\n          const node = rc[m](...args);\n          if(node) svg.appendChild(node);\n          return node;\n        };\n      }\n    });\n    return out;\n  }\n\n  function drawIcon(rc, svg, kind){\n    const W = 300, H = 280;\n    switch(kind){\n      case 'candle': drawCandle(rc, svg, W, H); break;\n      case 'house':  drawHouse(rc, svg, W, H); break;\n      case 'gold':   drawGold(rc, svg, W, H); break;\n      case 'train':  drawTrain(rc, svg, W, H); break;\n      case 'star':   drawStarBuilding(rc, svg, W, H); break;\n      case 'chair':  drawChair(rc, svg, W, H); break;\n    }\n  }\n\n  function drawCandle(rc, svg, W, H){\n    // base plate\n    rc.ellipse(W/2, H-30, 180, 26, { stroke: INK, strokeWidth:2.5, roughness:2, fill: SOFT, fillStyle:'hachure', hachureGap: 4 });\n    // candle body\n    rc.rectangle(W/2-30, H-180, 60, 150, { stroke: INK, strokeWidth:2.5, roughness:1.8, fill:'#e8d8a8', fillStyle:'hachure', hachureGap: 5, hachureAngle: 30 });\n    // wick\n    rc.line(W/2, H-180, W/2, H-200, { stroke: INK, strokeWidth:2, roughness: 1.5 });\n    // flame\n    rc.polygon([\n      [W/2, H-260], [W/2+18, H-220], [W/2, H-200], [W/2-18, H-220]\n    ], { stroke: RED, strokeWidth:2.5, roughness:1.6, fill: GOLD, fillStyle:'hachure', hachureGap:3 });\n    // little heart\n    const hx = 60, hy = 60, r = 14;\n    rc.circle(hx-r/2, hy, r, { stroke: RED, strokeWidth:2, roughness:1.6, fill: RED, fillStyle:'solid' });\n    rc.circle(hx+r/2, hy, r, { stroke: RED, strokeWidth:2, roughness:1.6, fill: RED, fillStyle:'solid' });\n    rc.polygon([[hx-r, hy+3],[hx+r, hy+3],[hx, hy+r+8]], { stroke: RED, strokeWidth:2, roughness:1.6, fill: RED, fillStyle:'solid' });\n    // crack through heart\n    rc.line(hx-4, hy-12, hx+4, hy+6, { stroke:'#f1e6ce', strokeWidth:3, roughness:0.5 });\n    rc.line(hx+4, hy+6, hx-4, hy+18, { stroke:'#f1e6ce', strokeWidth:3, roughness:0.5 });\n    // year etched at bottom-right\n    addLabel(svg, W-50, H-12, '1932', { fill: SOFT, size:18 });\n  }\n\n  function drawHouse(rc, svg, W, H){\n    // ground\n    rc.line(20, H-30, W-20, H-30, { stroke: INK, strokeWidth:2, roughness:2 });\n    // house body\n    rc.rectangle(70, 110, 160, 140, { stroke: INK, strokeWidth:3, roughness:2, fill:'#d9c79b', fillStyle:'cross-hatch', hachureGap:9 });\n    // roof\n    rc.polygon([[60, 110],[150, 40],[240, 110]], { stroke: INK, strokeWidth:3, roughness:2, fill: SOFT, fillStyle:'hachure', hachureGap:5 });\n    // door\n    rc.rectangle(135, 180, 36, 70, { stroke: INK, strokeWidth:2.5, roughness:1.8, fill: '#3a2a1a', fillStyle:'hachure', hachureGap:4 });\n    // windows\n    rc.rectangle(90, 140, 32, 32, { stroke: INK, strokeWidth:2, roughness:1.8, fill:'#fff5d8', fillStyle:'solid' });\n    rc.rectangle(178, 140, 32, 32, { stroke: INK, strokeWidth:2, roughness:1.8, fill:'#fff5d8', fillStyle:'solid' });\n    rc.line(106, 140, 106, 172, { stroke: INK, strokeWidth:1.5 });\n    rc.line(90, 156, 122, 156, { stroke: INK, strokeWidth:1.5 });\n    rc.line(194, 140, 194, 172, { stroke: INK, strokeWidth:1.5 });\n    rc.line(178, 156, 210, 156, { stroke: INK, strokeWidth:1.5 });\n    // big red X on the door — \"vertrieben\"\n    rc.line(120, 50, 200, 250, { stroke: RED, strokeWidth: 6, roughness: 2.5 });\n    rc.line(200, 50, 120, 250, { stroke: RED, strokeWidth: 6, roughness: 2.5 });\n    // suitcase walking away\n    rc.rectangle(245, 195, 38, 28, { stroke: INK, strokeWidth:2.2, roughness:1.6, fill: '#6b4a26', fillStyle:'hachure', hachureGap:4 });\n    rc.line(258, 195, 258, 188, { stroke: INK, strokeWidth:1.8 });\n    rc.line(270, 195, 270, 188, { stroke: INK, strokeWidth:1.8 });\n    rc.line(258, 188, 270, 188, { stroke: INK, strokeWidth:1.8 });\n    // arrow away\n    rc.line(245, 175, 285, 175, { stroke: RED, strokeWidth:2.2, roughness:1.5 });\n    rc.line(285, 175, 277, 170, { stroke: RED, strokeWidth:2.2, roughness:1.5 });\n    rc.line(285, 175, 277, 180, { stroke: RED, strokeWidth:2.2, roughness:1.5 });\n    addLabel(svg, 150, H-8, 'Rosenaustr. 13', { fill: SOFT, size:18 });\n  }\n\n  function drawGold(rc, svg, W, H){\n    // tray\n    rc.ellipse(W/2, H-50, 240, 40, { stroke: INK, strokeWidth:2.5, roughness:2, fill: SOFT, fillStyle:'hachure', hachureGap:4 });\n    rc.ellipse(W/2, H-60, 240, 30, { stroke: INK, strokeWidth:2, roughness:1.6, fill: '#f1e6ce', fillStyle:'solid' });\n    // pocket watch\n    rc.circle(95, 130, 88, { stroke: INK, strokeWidth:3, roughness:1.8, fill: GOLD, fillStyle:'hachure', hachureGap:4 });\n    rc.circle(95, 130, 70, { stroke: INK, strokeWidth:1.5, roughness:1.4, fill:'#fff5d8', fillStyle:'solid' });\n    // hands\n    rc.line(95, 130, 95, 105, { stroke: INK, strokeWidth:2 });\n    rc.line(95, 130, 115, 140, { stroke: INK, strokeWidth:2 });\n    // tick marks\n    for(let i=0;i<12;i++){\n      const a = (i/12)*Math.PI*2;\n      const x1 = 95 + Math.cos(a)*30, y1 = 130 + Math.sin(a)*30;\n      const x2 = 95 + Math.cos(a)*34, y2 = 130 + Math.sin(a)*34;\n      rc.line(x1,y1,x2,y2,{stroke: INK, strokeWidth: 1.5});\n    }\n    // crown\n    rc.rectangle(88, 76, 14, 14, { stroke: INK, strokeWidth:2, fill: GOLD, fillStyle:'solid', roughness:1.4 });\n    // chain\n    for(let i=0;i<6;i++){\n      rc.circle(105+i*14, 80-i*4, 9, { stroke: GOLD, strokeWidth: 2, roughness:1.2 });\n    }\n    // two rings\n    rc.circle(215, 95, 56, { stroke: GOLD, strokeWidth: 5, roughness:1.6, fill:'none' });\n    rc.circle(245, 130, 50, { stroke: GOLD, strokeWidth: 5, roughness:1.6, fill:'none' });\n    // brooch\n    rc.ellipse(190, 175, 60, 32, { stroke: INK, strokeWidth:2, roughness:1.6, fill: GOLD, fillStyle:'cross-hatch', hachureGap:5 });\n    rc.circle(190, 175, 12, { stroke: RED, strokeWidth:1.8, fill: RED, fillStyle:'solid' });\n    // hand stamp top\n    addLabel(svg, 30, 30, 'Nr. 671', { fill: RED, size: 22, rotate: -8 });\n  }\n\n  function drawTrain(rc, svg, W, H){\n    // tracks - perspective lines\n    rc.line(20, H-30, W-20, H-30, { stroke: INK, strokeWidth:2.5, roughness:1.8 });\n    rc.line(20, H-50, W-20, H-50, { stroke: INK, strokeWidth:2.5, roughness:1.8 });\n    for(let i=0;i<10;i++){\n      const x = 30 + i*28;\n      rc.line(x, H-50, x, H-30, { stroke: INK, strokeWidth:1.8, roughness:1.2 });\n    }\n    // locomotive body\n    rc.rectangle(40, 100, 140, 90, { stroke: INK, strokeWidth:3, roughness:2, fill: SOFT, fillStyle:'hachure', hachureGap:6 });\n    // cabin\n    rc.rectangle(150, 70, 60, 60, { stroke: INK, strokeWidth:3, roughness:1.8, fill:'#3a2a1a', fillStyle:'cross-hatch', hachureGap:6 });\n    // wheels\n    rc.circle(70, 200, 36, { stroke: INK, strokeWidth:3, roughness:1.6, fill: '#1c1a15', fillStyle:'solid' });\n    rc.circle(120, 200, 36, { stroke: INK, strokeWidth:3, roughness:1.6, fill: '#1c1a15', fillStyle:'solid' });\n    rc.circle(170, 200, 36, { stroke: INK, strokeWidth:3, roughness:1.6, fill: '#1c1a15', fillStyle:'solid' });\n    rc.circle(70, 200, 14, { stroke: '#f1e6ce', strokeWidth:2 });\n    rc.circle(120, 200, 14, { stroke: '#f1e6ce', strokeWidth:2 });\n    rc.circle(170, 200, 14, { stroke: '#f1e6ce', strokeWidth:2 });\n    // chimney\n    rc.rectangle(56, 70, 26, 30, { stroke: INK, strokeWidth:2.5, fill:SOFT, fillStyle:'solid', roughness:1.6 });\n    // smoke\n    rc.circle(70, 40, 30, { stroke: SOFT, strokeWidth:2, roughness:2, fill:'#bfa97f', fillStyle:'hachure', hachureGap:5 });\n    rc.circle(105, 25, 38, { stroke: SOFT, strokeWidth:2, roughness:2, fill:'#bfa97f', fillStyle:'hachure', hachureGap:5 });\n    rc.circle(150, 30, 32, { stroke: SOFT, strokeWidth:2, roughness:2, fill:'#bfa97f', fillStyle:'hachure', hachureGap:5 });\n    // cattle wagon\n    rc.rectangle(210, 100, 80, 90, { stroke: INK, strokeWidth:3, roughness:2, fill: '#6b4a26', fillStyle:'hachure', hachureGap:8 });\n    // slats\n    for(let i=0;i<5;i++){\n      rc.line(210+i*16, 100, 210+i*16, 190, { stroke: INK, strokeWidth:1.5 });\n    }\n    rc.circle(235, 200, 32, { stroke: INK, strokeWidth:3, roughness:1.6, fill: '#1c1a15', fillStyle:'solid' });\n    rc.circle(275, 200, 32, { stroke: INK, strokeWidth:3, roughness:1.6, fill: '#1c1a15', fillStyle:'solid' });\n    // tiny red destination tag\n    addLabel(svg, 250, 80, '→ Theresienstadt', { fill: RED, size: 18, rotate: -3 });\n  }\n\n  function drawStarBuilding(rc, svg, W, H){\n    // big Star of David, weathered\n    const cx = W/2, cy = H/2 - 10, r = 95;\n    function tri(angleOffset, color){\n      const pts = [];\n      for(let i=0;i<3;i++){\n        const a = angleOffset + (i*2*Math.PI/3);\n        pts.push([cx + Math.cos(a)*r, cy + Math.sin(a)*r]);\n      }\n      rc.polygon(pts, { stroke: INK, strokeWidth: 4, roughness:2.2, fill: color, fillStyle:'hachure', hachureGap: 6 });\n    }\n    tri(-Math.PI/2, GOLD);\n    tri(Math.PI/2, '#a8761a');\n    // inscription: \"I 508\"\n    addLabel(svg, cx, cy+8, 'I 508', { fill: INK, size: 28, weight: 700, anchor:'middle' });\n    addLabel(svg, cx, cy+38, 'der Boden', { fill: RED, size: 18, anchor:'middle' });\n    // small candle to the side\n    rc.rectangle(40, H-110, 18, 60, { stroke: INK, strokeWidth:2, fill:'#e8d8a8', fillStyle:'hachure', hachureGap:4 });\n    rc.line(49, H-110, 49, H-122, { stroke: INK, strokeWidth:1.5 });\n    rc.polygon([[49, H-148],[58, H-126],[49, H-122],[40, H-126]], { stroke: RED, strokeWidth:2, fill: GOLD, fillStyle:'solid', roughness:1.4 });\n    // small candle other side\n    rc.rectangle(W-58, H-110, 18, 60, { stroke: INK, strokeWidth:2, fill:'#e8d8a8', fillStyle:'hachure', hachureGap:4 });\n    rc.line(W-49, H-110, W-49, H-122, { stroke: INK, strokeWidth:1.5 });\n    rc.polygon([[W-49, H-148],[W-40, H-126],[W-49, H-122],[W-58, H-126]], { stroke: RED, strokeWidth:2, fill: GOLD, fillStyle:'solid', roughness:1.4 });\n  }\n\n  function drawChair(rc, svg, W, H){\n    // empty chair\n    // seat\n    rc.rectangle(80, 150, 140, 28, { stroke: INK, strokeWidth:3, roughness:1.8, fill: '#6b4a26', fillStyle:'hachure', hachureGap:5 });\n    // back\n    rc.rectangle(80, 60, 140, 95, { stroke: INK, strokeWidth:3, roughness:1.8, fill:'none' });\n    // back slats\n    rc.line(115, 60, 115, 155, { stroke: INK, strokeWidth:2 });\n    rc.line(150, 60, 150, 155, { stroke: INK, strokeWidth:2 });\n    rc.line(185, 60, 185, 155, { stroke: INK, strokeWidth:2 });\n    // legs\n    rc.line(95, 178, 95, 250, { stroke: INK, strokeWidth:3 });\n    rc.line(205, 178, 205, 250, { stroke: INK, strokeWidth:3 });\n    rc.line(110, 178, 110, 248, { stroke: INK, strokeWidth:2 });\n    rc.line(190, 178, 190, 248, { stroke: INK, strokeWidth:2 });\n    // floor\n    rc.line(40, 250, W-40, 250, { stroke: INK, strokeWidth:2, roughness:2 });\n    // dust / silence rays\n    rc.line(40, 30, 80, 60, { stroke: SOFT, strokeWidth:1.2, roughness:0.5 });\n    rc.line(60, 30, 100, 60, { stroke: SOFT, strokeWidth:1.2, roughness:0.5 });\n    rc.line(W-40, 30, W-80, 60, { stroke: SOFT, strokeWidth:1.2, roughness:0.5 });\n    rc.line(W-60, 30, W-100, 60, { stroke: SOFT, strokeWidth:1.2, roughness:0.5 });\n    // \"leer\" handwritten across in red\n    addLabel(svg, W/2, 125, '— leer —', { fill: RED, size: 26, anchor:'middle', rotate: -4 });\n  }\n\n  function addLabel(svg, x, y, text, opts={}){\n    const t = document.createElementNS('http://www.w3.org/2000/svg','text');\n    t.setAttribute('x', x);\n    t.setAttribute('y', y);\n    t.setAttribute('fill', opts.fill || INK);\n    t.setAttribute('font-family', opts.font || 'Caveat, cursive');\n    t.setAttribute('font-size', opts.size || 22);\n    if(opts.weight) t.setAttribute('font-weight', opts.weight);\n    if(opts.anchor) t.setAttribute('text-anchor', opts.anchor);\n    if(opts.rotate) t.setAttribute('transform', `rotate(${opts.rotate} ${x} ${y})`);\n    t.textContent = text;\n    svg.appendChild(t);\n  }\n\n  // wait for fonts + layout\n  if(document.readyState === 'complete'){\n    init();\n  } else {\n    window.addEventListener('load', init);\n  }\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
